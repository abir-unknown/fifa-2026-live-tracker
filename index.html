<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Schedule (Bangladesh Time)</title>
    <style>
        :root {
            --primary: #006c35;
            --secondary: #8c1d40;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary), #004d26);
            color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        header p {
            margin: 0;
            opacity: 0.9;
            font-size: 14px;
        }

        .timezone-badge {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
            font-size: 12px;
        }

        .match-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 5px solid var(--secondary);
            transition: transform 0.2s;
        }

        .match-card:hover {
            transform: translateY(-2px);
        }

        .match-info {
            flex: 1;
        }

        .group-tag {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--secondary);
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .teams {
            font-size: 16px;
            font-weight: 600;
            margin: 5px 0;
        }

        .venue {
            font-size: 12px;
            color: var(--text-light);
        }

        .match-time-box {
            text-align: right;
            padding-left: 20px;
            border-left: 1px solid #e2e8f0;
            min-width: 140px;
        }

        .bd-date {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .bd-time {
            font-size: 16px;
            font-weight: 700;
            margin-top: 2px;
        }

        @media (max-width: 600px) {
            .match-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .match-time-box {
                text-align: left;
                padding-left: 0;
                border-left: none;
                border-top: 1px solid #e2e8f0;
                width: 100%;
                margin-top: 15px;
                padding-top: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FIFA World Cup 2026™ Match Schedule</h1>
        <p>Opening fixtures converted from local stadium times directly to your local timezone</p>
        <div class="timezone-badge">Timezone: Bangladesh Time (BST / UTC+6)</div>
    </header>

    <div id="schedule-container"></div>
</div>

<script>
    // Complete structured match data with standard ISO timestamps
    const matchSchedule = [
        {
            matchNo: 1,
            group: "Group A",
            homeTeam: "Mexico 🇲🇽",
            awayTeam: "South Africa 🇿🇦",
            venue: "Estadio Azteca, Mexico City",
            isoStart: "2026-06-12T01:00:00+06:00" // Corresponds to June 11, 19:00 Local
        },
        {
            matchNo: 2,
            group: "Group A",
            homeTeam: "South Korea 🇰🇷",
            awayTeam: "Czechia 🇨🇿",
            venue: "Estadio Akron, Guadalajara",
            isoStart: "2026-06-12T08:00:00+06:00"
        },
        {
            matchNo: 3,
            group: "Group B",
            homeTeam: "Canada 🇨🇦",
            awayTeam: "Bosnia & Herzegovina 🇧🇦",
            venue: "BMO Field, Toronto",
            isoStart: "2026-06-13T01:00:00+06:00"
        },
        {
            matchNo: 4,
            group: "Group D",
            homeTeam: "United States 🇺🇸",
            awayTeam: "Paraguay 🇵🇾",
            venue: "SoFi Stadium, Los Angeles",
            isoStart: "2026-06-13T07:00:00+06:00"
        },
        {
            matchNo: 5,
            group: "Group B",
            homeTeam: "Qatar 🇶🇦",
            awayTeam: "Switzerland 🇨🇭",
            venue: "Levi's Stadium, San Francisco",
            isoStart: "2026-06-14T01:00:00+06:00"
        },
        {
            matchNo: 6,
            group: "Group C",
            homeTeam: "Brazil 🇧🇷",
            awayTeam: "Morocco 🇲🇦",
            venue: "MetLife Stadium, New York/New Jersey",
            isoStart: "2026-06-14T04:00:00+06:00"
        },
        {
            matchNo: 7,
            group: "Group C",
            homeTeam: "Haiti 🇭🇹",
            awayTeam: "Scotland 🏴󠁧󠁢󠁳󠁣󠁴󠁿",
            venue: "Gillette Stadium, Boston",
            isoStart: "2026-06-14T07:00:00+06:00"
        },
        {
            matchNo: 8,
            group: "Group D",
            homeTeam: "Australia 🇦🇺",
            awayTeam: "Türkiye 🇹🇷",
            venue: "BC Place, Vancouver",
            isoStart: "2026-06-14+10:00:00+06:00"
        },
        {
            matchNo: 9,
            group: "Group E",
            homeTeam: "Germany 🇩🇪",
            awayTeam: "Curaçao 🇨🇼",
            venue: "NRG Stadium, Houston",
            isoStart: "2026-06-14T23:00:00+06:00"
        },
        {
            matchNo: 10,
            group: "Group F",
            homeTeam: "Netherlands 🇳🇱",
            awayTeam: "Japan 🇯🇵",
            venue: "AT&T Stadium, Dallas",
            isoStart: "2026-06-15T02:00:00+06:00"
        }
    ];

    function renderSchedule() {
        const container = document.getElementById('schedule-container');
        container.innerHTML = '';

        matchSchedule.forEach(match => {
            // Instantiates date from fixed ISO string
            const matchDate = new Date(match.isoStart);

            // Explicit formatting parameters tailored for localized Bangladeshi display values
            const dateOptions = { 
                weekday: 'long', 
                day: 'numeric', 
                month: 'short', 
                year: 'numeric',
                timeZone: 'Asia/Dhaka'
            };
            
            const timeOptions = { 
                hour: '2-digit', 
                minute: '2-digit', 
                hour12: true,
                timeZone: 'Asia/Dhaka'
            };

            const formattedDate = matchDate.toLocaleDateString('en-US', dateOptions);
            const formattedTime = matchDate.toLocaleTimeString('en-US', timeOptions);

            const matchCard = document.createElement('div');
            matchCard.className = 'match-card';
            matchCard.innerHTML = `
                <div class="match-info">
                    <div class="group-tag">Match ${match.matchNo} • ${match.group}</div>
                    <div class="teams">${match.homeTeam} vs ${match.awayTeam}</div>
                    <div class="venue">${match.venue}</div>
                </div>
                <div class="match-time-box">
                    <div class="bd-date">${formattedDate}</div>
                    <div class="bd-time">${formattedTime}</div>
                </div>
            `;
            container.appendChild(matchCard);
        });
    }

    // Initialize schedule rendering on DOM generation
    window.addEventListener('DOMContentLoaded', renderSchedule);
</script>

</body>
</html>
