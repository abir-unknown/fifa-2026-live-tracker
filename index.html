<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026™ Matrix Core (BST)</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131c2e;
            --border-color: #1e293b;
            --accent-green: #00df89;
            --accent-purple: #a855f7;
            --accent-orange: #f97316;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #3b82f6, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111827;
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .zone-badge {
            background: rgba(0, 223, 137, 0.15);
            color: var(--accent-green);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .creator-badge {
            background: rgba(168, 85, 247, 0.15);
            color: var(--accent-purple);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        /* Filter Controls */
        .filter-section {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        .filter-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
        }

        .filter-btn.knockout-btn {
            border-color: rgba(249, 115, 22, 0.4);
        }
        .filter-btn.knockout-btn.active, .filter-btn.knockout-btn:hover {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
        }

        /* Group Standings Summary View */
        .groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .group-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .group-card h3 {
            color: var(--accent-purple);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }

        .group-team-item {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        /* Schedule Display Grid */
        .schedule-title {
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid var(--accent-purple);
            padding-left: 0.75rem;
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease;
        }

        .match-card:hover {
            transform: translateY(-3px);
            border-color: #4b5563;
        }

        .match-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: bold;
            text-transform: uppercase;
        }

        .match-main {
            margin: 1.25rem 0;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.3rem 0;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .time-engine-box {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            padding: 0.75rem;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .bst-date {
            color: var(--accent-green);
            font-size: 0.85rem;
            font-weight: bold;
        }

        .bst-time {
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 0.15rem;
        }

        .venue-info {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-style: italic;
        }

        ::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FIFA WORLD CUP 2026™ DATABASE MATRIX</h1>
        <p>Live Match Tracker & Tournament Matrix</p>
    </header>

    <div class="meta-bar">
        <div class="zone-badge">⏰ System Sync: Bangladesh Standard Time (BST / UTC+6)</div>
        <div class="creator-badge">🛠️ Created by unXknown</div>
        <div id="liveClock" style="font-family: monospace; font-weight: bold;">--:--:-- PM BST</div>
    </div>

    <div class="schedule-title">📋 Official Group Allocations</div>
    <div class="groups-container" id="groupsContainer"></div>

    <div class="schedule-title">📅 Live Match Matrix Timeline (Converted to BST)</div>
    
    <div class="filter-section">
        <button class="filter-btn active" onclick="filterMatches('ALL')">All Matches</button>
        <button class="filter-btn" onclick="filterMatches('Group A')">Group A</button>
        <button class="filter-btn" onclick="filterMatches('Group B')">Group B</button>
        <button class="filter-btn" onclick="filterMatches('Group C')">Group C</button>
        <button class="filter-btn" onclick="filterMatches('Group D')">Group D</button>
        <button class="filter-btn" onclick="filterMatches('Group E')">Group E</button>
        <button class="filter-btn" onclick="filterMatches('Group F')">Group F</button>
        <button class="filter-btn" onclick="filterMatches('Group G')">Group G</button>
        <button class="filter-btn" onclick="filterMatches('Group H')">Group H</button>
        <button class="filter-btn" onclick="filterMatches('Group I')">Group I</button>
        <button class="filter-btn" onclick="filterMatches('Group J')">Group J</button>
        <button class="filter-btn" onclick="filterMatches('Group K')">Group K</button>
        <button class="filter-btn" onclick="filterMatches('Group L')">Group L</button>
        <button class="filter-btn knockout-btn" onclick="filterMatches('Round of 32')">Round of 32</button>
        <button class="filter-btn knockout-btn" onclick="filterMatches('Round of 16')">Round of 16</button>
        <button class="filter-btn knockout-btn" onclick="filterMatches('Quarter-Finals')">Quarter-Finals</button>
        <button class="filter-btn knockout-btn" onclick="filterMatches('Semi-Finals')">Semi-Finals</button>
        <button class="filter-btn knockout-btn" onclick="filterMatches('Finals')">Finals & Bronze</button>
    </div>

    <div class="match-grid" id="matchMatrixContainer"></div>
</div>

<script>

        { id: 3, stage: "Group B", home: "Canada (CAN)", away: "Bosnia & Herzegovina (BIH)", venue: "Toronto Stadium, Eastern Region", etIso: "2026-06-12T15:00:00-04:00" },
        { id: 4, stage: "Group D", home: "USA (USA)", away: "Paraguay (PAR)", venue: "Los Angeles Stadium, Western Region", etIso: "2026-06-12T21:00:00-04:00" },
        { id: 5, stage: "Group B", home: "Qatar (QAT)", away: "Switzerland (SUI)", venue: "San Francisco Bay Area Stadium", etIso: "2026-06-13T15:00:00-04:00" },

        { id: 10, stage: "Group F", home: "Netherlands (NED)", away: "Japan (JPN)", venue: "Dallas Stadium, Central Region", etIso: "2026-06-14T16:00:00-04:00" },
        { id: 11, stage: "Group G", home: "Belgium (BEL)", away: "Egypt (EGY)", venue: "San Francisco Bay Area Stadium", etIso: "2026-06-15T15:00:00-04:00" },

        { id: 73, stage: "Round of 32", home: "Winner Group A", away: "3rd Place Group C/D/E/H", venue: "Los Angeles Stadium, Western Region", etIso: "2026-06-28T21:00:00-04:00" },

        { id: 89, stage: "Round of 16", home: "Winner Match 73", away: "Winner Match 74", venue: "BC Place, Vancouver Region", etIso: "2026-07-04T17:00:00-04:00" },
        { id: 90, stage: "Round of 16", home: "Winner Match 75", away: "Winner Match 76", venue: "Philadelphia Stadium, Eastern Region", etIso: "2026-07-05T16:00:00-04:00" },

        { id: 97, stage: "Quarter-Finals", home: "Winner Match 89", away: "Winner Match 90", venue: "Boston Stadium, Eastern Region", etIso: "2026-07-09T15:00:00-04:00" },
        { id: 98, stage: "Quarter-Finals", home: "Winner Match 91", away: "Winner Match 92", venue: "Los Angeles Stadium, Western Region", etIso: "2026-07-10T21:00:00-04:00" },

        // Semi-Finals [Source: 21]
        { id: 101, stage: "Semi-Finals", home: "Winner Match 97", away: "Winner Match 98", venue: "Dallas Stadium, Central Region", etIso: "2026-07-14T18:00:00-04:00" },
        { id: 102, stage: "Semi-Finals", home: "Winner Match 99", away: "Winner Match 100", venue: "Atlanta Stadium, Central Region", etIso: "2026-07-15T18:00:00-04:00" },

        // Bronze Third-Place Match [Source: 15]
        { id: 103, stage: "Finals", home: "Loser Match 101", away: "Loser Match 102", venue: "Hard Rock Stadium, Miami Region", etIso: "2026-07-18T16:00:00-04:00" },

        // The Grand Final [Source: 22]
        { id: 104, stage: "Finals", home: "Winner Match 101", away: "Winner Match 102", venue: "MetLife Stadium, New York New Jersey", etIso: "2026-07-19T15:00:00-04:00" }
    ];

    function buildGroupContainers() {
        const container = document.getElementById("groupsContainer");
        container.innerHTML = "";
        Object.keys(OFFICIAL_GROUPS).forEach(gKey => {
            const card = document.createElement("div");
            card.className = "group-card";
            let teamRows = OFFICIAL_GROUPS[gKey].map(t => `<div class="group-team-item"><span>${t}</span></div>`).join('');
            card.innerHTML = `<h3>${gKey}</h3>${teamRows}`;
            container.appendChild(card);
        });
    }

    function renderMatchEngine(filterStage = "ALL") {
        const container = document.getElementById("matchMatrixContainer");
        container.innerHTML = "";

        const targetMatches = filterStage === "ALL" ? FIXTURE_MATRIX : FIXTURE_MATRIX.filter(m => m.stage === filterStage);

        targetMatches.forEach(match => {
            const dateObj = new Date(match.etIso);

            const bstDateStr = dateObj.toLocaleDateString("en-US", {
                weekday: "short", month: "short", day: "numeric", year: "numeric", timeZone: "Asia/Dhaka"
            });
            const bstTimeStr = dateObj.toLocaleTimeString("en-US", {
                hour: "2-digit", minute: "2-digit", hour12: true, timeZone: "Asia/Dhaka"
            });

            // Adjust styles depending on match tier types
            const isKnockout = match.stage !== "Group Phase" && !match.stage.startsWith("Group");
            const metaColor = isKnockout ? "var(--accent-orange)" : "var(--accent-purple)";

            const card = document.createElement("div");
            card.className = "match-card";
            card.innerHTML = `
                <div class="match-meta">
                    <span>Match ${match.id} · ${match.stage}</span>
                    <span style="color: ${metaColor}">${isKnockout ? 'Knockout Stage' : 'Group Phase'}</span>
                </div>
                <div class="match-main">
                    <div class="team-row"><span>${match.home}</span><span>-</span></div>
                    <div class="team-row"><span>${match.away}</span><span>-</span></div>
                </div>
                <div class="time-engine-box">
                    <div class="bst-date">🇧🇩 ${bstDateStr}</div>
                    <div class="bst-time">${bstTimeStr}</div>
                    <div class="venue-info">📍 ${match.venue}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function filterMatches(stage) {
        document.querySelectorAll(".filter-btn").forEach(btn => {
            if(btn.innerText.includes(stage) || (stage === 'ALL' && btn.innerText === 'All Matches') || (stage === 'Finals' && btn.innerText === 'Finals & Bronze')) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
        renderMatchEngine(stage);
    }

    function runLiveClock() {
        const timeStr = new Date().toLocaleTimeString("en-US", { timeZone: "Asia/Dhaka" });
        document.getElementById("liveClock").innerText = timeStr + " BST";
    }

    window.addEventListener("DOMContentLoaded", () => {
        buildGroupContainers();
        renderMatchEngine();
        setInterval(runLiveClock, 1000);
        runLiveClock();
    });
</script>
</body>
</html>
